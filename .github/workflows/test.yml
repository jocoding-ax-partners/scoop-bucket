name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON manifests
        run: |
          for f in bucket/*.json; do
            echo "Validating $f"
            /usr/bin/python3 -c "import json; json.load(open('$f'))"
          done
